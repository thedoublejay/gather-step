# imports `useAuthentication` from `@workspace/shared-contracts` and calls
# it. The planning-mode upstream widening in
# `widen_planning_upstream_for_shared_peers` finds the virtual
# `SharedSymbol` peer by name and promotes the referring file as a cross-repo
# caller — without upgrading the imported call site into confirmed
# downstream evidence.
