# HIGH planning-gate for the frontend auth/session anchor scenario.
#
# Objective pass/fail criteria for the objective pass/fail criteria:
#
#   - The canonical auth hook (`useAuthentication` in `frontend_standard`) must
#     rank as the primary item — not a co-change peer, not the local shim in
#     `auth_local.ts`, and not an MCP-transport artifact.
#
#   - The pack must pull in the session caller (`auth_consumer.ts`) and the
#     payload/API layer file (`api.ts`) as structural neighbours. These are the
#     "related payload/response types" the bar requires alongside the anchor.
#
#   - At least one cross-repo caller repo must be reported (the widened
#     upstream traversal must detect `backend_standard` importing via
#     `@workspace/shared-contracts`). This exercises the cross-repo
#     dependency surface requirement without upgrading the weak signal into a
#     confirmed downstream repo.
#
#   - `auth_local.ts` is forbidden as the primary file because it is the
#     stub shim (`{ token: null }`) — ranking it first would indicate the
#     search resolver chose the wrong declaration.
#
#   - `api_unresolved.ts` is forbidden unconditionally (noise gate).
#
# Fixture anchor: `frontend_standard/src/auth_api.ts:useAuthentication`
# (the async function that delegates to `loadOrders`; `auth_local.ts` has a
# same-named stub which must not win the primary slot).

name = "frontend_hook_rollout"
mode = "planning"
repo = "frontend_standard"

[target]
kind = "symbol"
qn = "useAuthentication"

[oracle]
expected_files = [
  "src/auth_api.ts",
  "src/auth_consumer.ts",
  "src/api.ts",
]
forbidden_files = [
  "src/api_unresolved.ts",
]
max_follow_ups = 6
min_confidence = 900
required_ambiguity_codes = []
expected_primary_symbol_name = "useAuthentication"
expected_primary_symbol_kind = "function"
expected_primary_repo = "frontend_standard"
expected_primary_file = "src/auth_api.ts"
expected_resolved_symbol_kind = "function"
expected_cross_repo_caller_repos = ["backend_standard"]
forbidden_cross_repo_caller_repos = []
forbidden_confirmed_downstream_repos = ["backend_standard"]
max_probable_downstream_repos = 0
forbidden_warnings = ["target could not be resolved to a unique indexed symbol"]
expected_resolution = "search_ranked_resolved"
expected_confidence_model_version = "v1.0"
max_response_bytes = 18000
