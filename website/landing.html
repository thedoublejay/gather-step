<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Gather Step, polyrepo code intelligence for AI coding assistants</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root {
    --gs-blue: #00538c;
    --gs-blue-deep: #0d6aa8;
    --gs-blue-high: #9bd0ff;
    --gs-blue-soft: #cfeaff;
    --gs-orange: #ff8c00;
    --gs-orange-high: #ffcb84;
    --gs-dark: #1a1a1b;
    --gs-dark-soft: #242426;
    --gs-dark-elevated: #2d2d30;
    --gs-ink: #0f0f10;
    --gs-light: #f8f9fa;
    --gs-gray-2: #ededf0;
    --gs-gray-3: #d5d7dd;
    --gs-gray-4: #9a9ea8;
    --gs-gray-5: #676b74;
    --gs-gray-6: #40424a;
    --gs-hair: rgba(255,255,255,0.08);
    --gs-hair-strong: rgba(255,255,255,0.14);
    --radius-lg: 1.2rem;
    --radius-xl: 1.6rem;
    --radius-md: 0.7rem;
    --font-sans: 'Inter', ui-sans-serif, system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  html {
    background:
      radial-gradient(1200px 600px at 50% -200px, rgba(0, 83, 140, 0.28), transparent 60%),
      radial-gradient(800px 400px at 90% 10%, rgba(255, 140, 0, 0.08), transparent 60%),
      linear-gradient(180deg, #1b1b1d 0%, #171719 45%, #121315 100%);
    background-color: var(--gs-dark);
    color: var(--gs-light);
    font-family: var(--font-sans);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  body { min-height: 100vh; }
  a { color: inherit; }
  h1, h2, h3, h4 { letter-spacing: -0.03em; margin: 0; }
  p { margin: 0; line-height: 1.68; color: var(--gs-gray-3); }

  /* shared */
  .wrap { max-width: 78rem; margin: 0 auto; padding: 0 1.5rem; }
  .eyebrow {
    display: inline-flex; align-items: center; gap: 0.55rem;
    color: var(--gs-blue-high);
    font-size: 0.7rem; font-weight: 700;
    letter-spacing: 0.2em; text-transform: uppercase;
  }
  .eyebrow-dot {
    width: 0.45rem; height: 0.45rem; border-radius: 999px;
    background: var(--gs-orange);
    box-shadow: 0 0 0 4px rgba(255, 140, 0, 0.14);
  }
  .mono { font-family: var(--font-mono); }
  .pill {
    display: inline-flex; align-items: center; gap: 0.45rem;
    padding: 0.42rem 0.8rem; border-radius: 999px;
    border: 1px solid var(--gs-hair-strong);
    background: rgba(255,255,255,0.04);
    font-size: 0.7rem; font-weight: 700;
    letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--gs-gray-2);
  }
  .pill--primary {
    border-color: rgba(0, 83, 140, 0.38);
    background: rgba(0, 83, 140, 0.16);
    color: var(--gs-blue-soft);
  }
  .pill--orange {
    border-color: rgba(255, 140, 0, 0.32);
    background: rgba(255, 140, 0, 0.1);
    color: var(--gs-orange-high);
  }
  .btn {
    display: inline-flex; align-items: center; gap: 0.55rem;
    padding: 0.95rem 1.6rem;
    border-radius: 0.85rem;
    font-weight: 700; font-size: 0.95rem;
    text-decoration: none; border: 1px solid transparent;
    cursor: pointer;
    transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
  }
  .btn--primary {
    background: linear-gradient(135deg, var(--gs-blue) 0%, var(--gs-blue-deep) 100%);
    color: #fff;
    box-shadow: 0 14px 30px rgba(0, 83, 140, 0.3);
  }
  .btn--primary:hover { transform: translateY(-1px); }
  .btn--ghost {
    background: rgba(255,255,255,0.04);
    border-color: var(--gs-hair-strong);
    color: var(--gs-light);
  }
  .btn--ghost:hover { border-color: var(--gs-blue-high); background: rgba(255,255,255,0.06); }

  .card {
    border-radius: var(--radius-lg);
    border: 1px solid var(--gs-hair);
    background: linear-gradient(180deg, rgba(36,36,38,0.9), rgba(28,28,30,0.96));
    box-shadow: 0 14px 36px rgba(0,0,0,0.22);
  }

  /* NAV */
  .nav {
    position: sticky; top: 0; z-index: 50;
    backdrop-filter: blur(14px);
    background: rgba(22,22,24,0.72);
    border-bottom: 1px solid var(--gs-hair);
  }
  .nav__row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.9rem 0;
  }
  .nav__brand { display: flex; align-items: center; gap: 0.65rem; text-decoration: none; color: inherit; }
  .nav__brand img { width: 2rem; height: 2rem; display: block; }
  .nav__brand b { font-weight: 800; font-size: 1.02rem; letter-spacing: -0.02em; }
  .nav__links { display: flex; align-items: center; gap: 1.7rem; }
  .nav__links a { text-decoration: none; font-size: 0.92rem; color: var(--gs-gray-3); }
  .nav__links a:hover { color: var(--gs-light); }
  .nav__cta { display: flex; gap: 0.55rem; align-items: center; }

  /* HERO */
  .hero { padding: 5.5rem 0 3.5rem; position: relative; }
  .hero__inner { display: grid; gap: 2rem; place-items: center; text-align: center; }
  .hero h1 {
    font-size: clamp(3.4rem, 8.2vw, 6.8rem);
    line-height: 0.92;
    font-weight: 800;
    letter-spacing: -0.06em;
    max-width: 14ch;
  }
  .hero h1 .hl { color: var(--gs-blue-soft); }
  .hero .tagline {
    max-width: 52rem;
    font-size: clamp(1.05rem, 1.7vw, 1.3rem);
    color: var(--gs-gray-3);
  }
  .hero__cli {
    border-radius: 0.85rem;
    border: 1px solid var(--gs-hair-strong);
    background: #0a0a0a;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    display: inline-flex; align-items: center; gap: 0.7rem;
    padding: 0.95rem 1.35rem;
    font-family: var(--font-mono);
    font-size: clamp(0.88rem, 1.5vw, 1.02rem);
  }
  .hero__cli .prompt { color: rgba(155,208,255,0.75); font-weight: 700; }
  .hero__cli .cmd { color: rgba(255,255,255,0.92); font-weight: 500; white-space: nowrap; }
  .hero__cli .cursor {
    width: 0.5rem; height: 1.05rem;
    background: rgba(155,208,255,0.6); border-radius: 1px;
    animation: blink 0.9s steps(1) infinite;
  }
  @keyframes blink { 0%,49% { opacity: 1; } 50%,100% { opacity: 0; } }
  .hero__actions { display: flex; gap: 0.8rem; flex-wrap: wrap; justify-content: center; }
  .hero__proof {
    display: flex; gap: 0.7rem; flex-wrap: wrap; justify-content: center;
    margin-top: 0.25rem;
  }
  .hero__mascot {
    position: absolute; right: -2rem; top: 3.5rem;
    width: 8.5rem; height: 8.5rem;
    opacity: 0.9;
    transform: rotate(-8deg);
    pointer-events: none;
    filter: drop-shadow(0 10px 28px rgba(0,0,0,0.3));
  }
  @media (max-width: 1100px) { .hero__mascot { display: none; } }

  /* SECTIONS */
  section.block { padding: 4.5rem 0; }
  .block__head { display: grid; gap: 0.9rem; max-width: 48rem; margin: 0 auto 2.5rem; text-align: center; justify-items: center; }
  .block__head h2 {
    font-size: clamp(2rem, 4vw, 3.2rem);
    line-height: 1.02;
    font-weight: 800;
  }
  .block__head p { font-size: 1.05rem; color: var(--gs-gray-3); max-width: 42rem; }

  /* PRIMARY CLAIM */
  .claim { display: grid; gap: 2.25rem; }
  .claim__lead {
    display: grid; gap: 1rem;
    text-align: center;
    justify-items: center;
    max-width: 56rem;
    margin: 0 auto;
  }
  .claim__headline {
    font-size: clamp(2rem, 4.4vw, 3.4rem);
    line-height: 1.02;
    letter-spacing: -0.04em;
    font-weight: 800;
    color: var(--gs-light);
  }
  .claim__headline .hl {
    color: var(--gs-blue-soft);
    background: linear-gradient(180deg, transparent 62%, rgba(0, 83, 140, 0.38) 62%);
    padding: 0 0.2rem;
  }
  .claim__kicker {
    font-family: var(--font-mono);
    font-size: 0.8rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gs-blue-high);
  }

  .claim__pillars {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 1rem;
    max-width: 68rem;
    margin: 0 auto;
  }
  @media (max-width: 820px) { .claim__pillars { grid-template-columns: 1fr; } }
  .pillar {
    display: grid; gap: 0.6rem;
    padding: 1.4rem 1.5rem 1.5rem;
    border-radius: var(--radius-lg);
    border: 1px solid var(--gs-hair);
    background: linear-gradient(180deg, rgba(34,34,36,0.88), rgba(24,24,26,0.96));
  }
  .pillar__ix {
    display: inline-flex; align-items: center; gap: 0.55rem;
    font-family: var(--font-mono);
    font-size: 0.7rem; letter-spacing: 0.2em;
    color: var(--gs-orange-high);
    text-transform: uppercase;
  }
  .pillar__ix i {
    width: 0.4rem; height: 0.4rem; border-radius: 999px;
    background: var(--gs-orange);
  }
  .pillar h3 {
    font-size: 1.1rem; font-weight: 700;
    letter-spacing: -0.01em;
    color: var(--gs-light);
  }
  .pillar p { font-size: 0.92rem; line-height: 1.6; }

  .claim__contrast {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 0.85rem;
    align-items: stretch;
    max-width: 70rem;
    margin: 0 auto;
  }
  @media (max-width: 820px) {
    .claim__contrast { grid-template-columns: 1fr; }
    .claim__arrow { transform: rotate(90deg); margin: 0.2rem auto; }
  }
  .contrast-col {
    padding: 1.1rem 1.25rem 1.2rem;
    border-radius: var(--radius-lg);
    border: 1px solid var(--gs-hair);
    background: rgba(18,18,20,0.7);
    display: grid; gap: 0.55rem;
    font-family: var(--font-mono);
    font-size: 0.84rem;
  }
  .contrast-col--before { border-color: rgba(255,132,132,0.22); }
  .contrast-col--after  { border-color: rgba(0,83,140,0.32); }
  .contrast-col__label {
    display: flex; align-items: center; gap: 0.4rem;
    font-size: 0.66rem; letter-spacing: 0.2em; text-transform: uppercase;
    font-family: var(--font-mono); font-weight: 700;
  }
  .contrast-col--before .contrast-col__label { color: #ff8484; }
  .contrast-col--after  .contrast-col__label { color: var(--gs-blue-soft); }
  .contrast-col__list { display: grid; gap: 0.32rem; color: var(--gs-gray-2); font-size: 0.88rem; line-height: 1.55; }
  .contrast-col__list div { display: grid; grid-template-columns: 1rem 1fr; gap: 0.45rem; }
  .contrast-col__mark { font-weight: 700; }
  .contrast-col--before .contrast-col__mark { color: #ff8484; }
  .contrast-col--after  .contrast-col__mark { color: var(--gs-blue-high); }
  .claim__arrow {
    display: grid; place-items: center;
    color: var(--gs-blue-high);
    font-family: var(--font-mono); font-size: 1.1rem;
    padding: 0 0.25rem;
    opacity: 0.85;
  }

  /* TOPOLOGY HERO GRAPHIC */
  .topo {
    padding: 4rem 0 4rem;
  }
  .topo__panel {
    border-radius: var(--radius-xl);
    border: 1px solid var(--gs-hair);
    background:
      radial-gradient(700px 360px at 30% 100%, rgba(0, 83, 140, 0.22), transparent 60%),
      radial-gradient(500px 260px at 90% 0%, rgba(255, 140, 0, 0.08), transparent 60%),
      linear-gradient(180deg, rgba(30,30,32,0.92), rgba(20,20,22,0.98));
    overflow: hidden;
    display: grid;
    grid-template-columns: 1fr;
  }
  .topo__copy {
    padding: 2.4rem 2.4rem 1.4rem;
    display: grid; gap: 0.8rem;
    text-align: center; justify-items: center; max-width: 48rem;
    margin: 0 auto;
  }
  .topo__copy h2 { font-size: clamp(1.7rem, 2.8vw, 2.4rem); line-height: 1.05; }
  .topo__copy p { font-size: 1rem; max-width: 40rem; }
  .topo__svg {
    position: relative;
    aspect-ratio: 760 / 500;
    width: 100%;
    max-width: 62rem;
    margin: 0 auto;
    padding: 0 1rem 2rem;
  }
  @media (max-width: 640px) {
    .topo__copy { padding: 1.8rem 1.4rem 1rem; }
  }

  /* DIFFERENTIATORS */
  .grid-6 {
    display: grid; grid-template-columns: repeat(3, minmax(0,1fr));
    gap: 1.15rem;
  }
  @media (max-width: 980px) { .grid-6 { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 640px) { .grid-6 { grid-template-columns: 1fr; } }
  .moat {
    padding: 1.55rem 1.6rem 1.65rem;
    display: grid; gap: 0.75rem;
    grid-template-rows: auto auto auto 1fr;
    min-height: 13rem;
  }
  .moat__num {
    font-family: var(--font-mono); font-size: 0.72rem;
    letter-spacing: 0.2em; color: var(--gs-blue-soft);
    font-weight: 700;
  }
  .moat h3 { font-size: 1.15rem; line-height: 1.25; font-weight: 700; }
  .moat p { color: var(--gs-gray-3); font-size: 0.95rem; line-height: 1.6; margin: 0; }
  .moat__tag {
    display: inline-flex; align-items: center; gap: 0.4rem;
    font-family: var(--font-mono); font-size: 0.66rem;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--gs-orange-high);
    padding: 0.28rem 0.55rem; border-radius: 0.5rem;
    background: rgba(255, 140, 0, 0.1);
    border: 1px solid rgba(255, 140, 0, 0.24);
    width: max-content;
  }

  /* PERSONAS */
  .personas {
    display: grid; grid-template-columns: repeat(5, minmax(0,1fr));
    gap: 0.9rem;
  }
  @media (max-width: 1080px) { .personas { grid-template-columns: repeat(2,1fr); } }
  @media (max-width: 560px) { .personas { grid-template-columns: 1fr; } }
  .persona {
    padding: 1.3rem 1.3rem 1.4rem;
    display: grid; gap: 0.5rem;
    border-radius: var(--radius-lg);
    border: 1px solid var(--gs-hair);
    background: linear-gradient(180deg, rgba(32,32,34,0.9), rgba(24,24,26,0.98));
  }
  .persona__role {
    font-size: 0.68rem; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--gs-blue-soft); font-weight: 700;
  }
  .persona h3 { font-size: 1rem; font-weight: 700; line-height: 1.25; }
  .persona p { font-size: 0.88rem; line-height: 1.6; color: var(--gs-gray-3); }

  /* COMPARISON */
  .compare { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 1.15rem; }
  @media (max-width: 900px) { .compare { grid-template-columns: 1fr; } }
  .compare__card { padding: 1.6rem 1.7rem; display: grid; gap: 0.8rem; }
  .compare__label { font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gs-gray-4); font-weight: 700; }
  .compare__card h3 { font-size: 1.2rem; line-height: 1.25; }
  .compare__rows { display: grid; gap: 0.6rem; margin-top: 0.3rem; }
  .compare__row {
    display: grid; grid-template-columns: auto 1fr; gap: 0.65rem;
    align-items: baseline; font-size: 0.92rem; color: var(--gs-gray-2);
  }
  .compare__mark { font-family: var(--font-mono); font-weight: 700; width: 1.1rem; display: inline-block; }
  .compare__mark--x { color: #ff8484; }
  .compare__mark--check { color: var(--gs-blue-high); }
  .compare__mark--eq { color: var(--gs-orange-high); }
  .compare__footer { font-size: 0.85rem; color: var(--gs-gray-4); border-top: 1px solid var(--gs-hair); padding-top: 0.85rem; margin-top: 0.4rem; line-height: 1.5; }

  /* HOW IT WORKS */
  .how {
    display: grid; grid-template-columns: repeat(3, minmax(0,1fr));
    gap: 1.1rem;
    counter-reset: step;
  }
  @media (max-width: 900px) { .how { grid-template-columns: 1fr; } }
  .step {
    padding: 1.55rem 1.6rem 1.65rem;
    display: grid; gap: 0.65rem;
    position: relative;
  }
  .step__num {
    font-family: var(--font-mono);
    font-size: 0.72rem; letter-spacing: 0.2em;
    color: var(--gs-orange-high); font-weight: 700;
  }
  .step h3 { font-size: 1.15rem; }
  .step p { font-size: 0.95rem; line-height: 1.6; }
  .step__code {
    margin-top: 0.6rem;
    font-family: var(--font-mono);
    font-size: 0.8rem;
    padding: 0.7rem 0.85rem;
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--gs-hair);
    border-radius: 0.55rem;
    color: var(--gs-blue-soft);
    overflow-x: auto;
  }
  .step__code .c-dim { color: var(--gs-gray-4); }

  /* CONTEXT PACKS */
  .packs { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 1rem; }
  @media (max-width: 860px) { .packs { grid-template-columns: 1fr; } }
  .pack {
    padding: 1.3rem 1.3rem 1.4rem;
    border-radius: var(--radius-lg);
    border: 1px solid var(--gs-hair);
    background: linear-gradient(180deg, rgba(32,32,34,0.92), rgba(22,22,24,0.98));
    display: grid; gap: 0.6rem;
  }
  .pack__tag {
    display: inline-flex; width: max-content;
    font-family: var(--font-mono); font-size: 0.72rem;
    letter-spacing: 0.1em; padding: 0.28rem 0.5rem;
    background: rgba(0, 83, 140, 0.18); color: var(--gs-blue-soft);
    border-radius: 0.4rem; border: 1px solid rgba(0, 83, 140, 0.32);
    font-weight: 700;
  }
  .pack h3 { font-size: 1.05rem; }
  .pack p { font-size: 0.9rem; color: var(--gs-gray-3); }
  .pack__meta { font-family: var(--font-mono); font-size: 0.76rem; color: var(--gs-gray-5); margin-top: 0.2rem; }

  /* BENCHMARK */
  .bench {
    border-radius: var(--radius-xl);
    border: 1px solid var(--gs-hair);
    background:
      radial-gradient(700px 360px at 20% 0%, rgba(0, 83, 140, 0.22), transparent 55%),
      radial-gradient(600px 300px at 100% 100%, rgba(255, 140, 0, 0.08), transparent 55%),
      linear-gradient(180deg, rgba(26,26,28,0.96), rgba(18,18,20,0.98));
    padding: 2.4rem 2.2rem 2.2rem;
    display: grid;
    gap: 2.2rem;
  }
  .bench__head {
    display: grid; gap: 0.8rem;
    grid-template-columns: 1fr auto;
    align-items: end;
  }
  @media (max-width: 760px) {
    .bench__head { grid-template-columns: 1fr; }
  }
  .bench__head h2 { font-size: clamp(1.7rem, 2.8vw, 2.4rem); line-height: 1.05; margin: 0; max-width: 42rem; }
  .bench__head p { margin: 0.4rem 0 0; color: var(--gs-gray-3); max-width: 44rem; font-size: 0.98rem; }
  .bench__tag {
    display: inline-flex; align-items: center; gap: 0.5rem;
    padding: 0.35rem 0.7rem;
    border-radius: 999px;
    background: rgba(255, 140, 0, 0.1);
    border: 1px solid rgba(255, 140, 0, 0.35);
    color: var(--gs-orange-high);
    font-family: var(--font-mono); font-size: 0.72rem;
    letter-spacing: 0.18em; text-transform: uppercase; font-weight: 700;
    white-space: nowrap;
  }
  .bench__tag i {
    width: 0.4rem; height: 0.4rem; border-radius: 999px;
    background: var(--gs-orange);
    box-shadow: 0 0 10px rgba(255,140,0,0.8);
  }

  /* Hero stat row */
  .bench__hero {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(0, 1.3fr);
    gap: 1.6rem;
    align-items: stretch;
  }
  @media (max-width: 900px) { .bench__hero { grid-template-columns: 1fr; } }
  .bench__stat {
    padding: 1.8rem;
    border-radius: var(--radius-lg);
    border: 1px solid rgba(0, 83, 140, 0.32);
    background: linear-gradient(180deg, rgba(22,26,32,0.96), rgba(14,16,20,0.98));
    display: grid; gap: 0.7rem; align-content: start;
  }
  .bench__stat__label {
    font-family: var(--font-mono);
    font-size: 0.7rem; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--gs-blue-high);

  /* ------------ TOPOLOGY VISUAL ------------ */
  function TopologyGraphic({ variant }) {
    // Orbit: producers on left, Topic virtual node center, consumers on right.
    // viewBox is generous; all boxes sit inside a padded inner area.
    const producers = [
      { y: 90,  repo: 'service-orders',   label: '@Producer' },
      { y: 220, repo: 'service-billing',  label: 'kafka.publish()' },
      { y: 350, repo: 'service-checkout', label: '@EventPattern' },
    ];
    const consumers = [
      { y: 60,  repo: 'service-inventory', label: '@MessagePattern' },
      { y: 170, repo: 'service-notify',    label: '@EventPattern' },
      { y: 280, repo: 'service-analytics', label: 'consumer.on()' },
      { y: 390, repo: 'service-ledger',    label: '@CustomEvent' },
    ];
    const boxW = 150;
    const boxH = 46;
    const pX = 40;        // producer column x
    const cX = 560;       // consumer column x  (cX + boxW = 710, inside 760)
    const topicX = 290;
    const topicY = 205;
    const topicW = 180;
    const topicH = 66;
    const topicCx = topicX + topicW / 2;
    const topicCy = topicY + topicH / 2;
    return (
      <svg
        viewBox="0 0 760 500"
        preserveAspectRatio="xMidYMid meet"
        width="100%"
        height="100%"
        style={{display:'block', position:'absolute', inset: 0}}
        aria-label="Producer-to-consumer event topology example"
      >
        <defs>
          <linearGradient id="edgeP" x1="0" x2="1">
            <stop offset="0" stopColor="var(--gs-blue-high)" stopOpacity="0.75"/>
            <stop offset="1" stopColor="var(--gs-orange)" stopOpacity="0.85"/>
          </linearGradient>
          <linearGradient id="edgeC" x1="0" x2="1">
            <stop offset="0" stopColor="var(--gs-orange)" stopOpacity="0.85"/>
            <stop offset="1" stopColor="var(--gs-blue-high)" stopOpacity="0.75"/>
          </linearGradient>
          <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="8"/>
          </filter>
        </defs>

        {/* grid dots */}
        <g opacity="0.1">
          {Array.from({length: 15}).map((_, r) =>
            Array.from({length: 23}).map((__, c) => (
              <circle key={r+'-'+c} cx={20+c*33} cy={20+r*33} r="1" fill="#9bd0ff" />
            ))
          )}
        </g>

        {/* Topic halo */}
        <circle cx={topicCx} cy={topicCy} r="96" fill="rgba(255,140,0,0.1)" filter="url(#soft)"/>

        {/* edges: producers -> topic */}
        <g fill="none" stroke="url(#edgeP)" strokeWidth="1.5" opacity="0.95">
          {producers.map((n, i) => {
            const sx = pX + boxW;
            const sy = n.y + boxH / 2;
            const tx = topicX;
            const ty = topicCy;
            const mx = (sx + tx) / 2;
            return <path key={'ep'+i} d={`M${sx} ${sy} C ${mx} ${sy}, ${mx} ${ty}, ${tx} ${ty}`} />;
          })}
        </g>

        {/* edges: topic -> consumers */}
        <g fill="none" stroke="url(#edgeC)" strokeWidth="1.5" opacity="0.95">
          {consumers.map((n, i) => {
            const sx = topicX + topicW;
            const sy = topicCy;
            const tx = cX;
            const ty = n.y + boxH / 2;
            const mx = (sx + tx) / 2;
            return <path key={'ec'+i} d={`M${sx} ${sy} C ${mx} ${sy}, ${mx} ${ty}, ${tx} ${ty}`} />;
          })}
        </g>

        {/* producer boxes */}
        {producers.map((n, i) => (
          <g key={'p'+i} transform={`translate(${pX},${n.y})`}>
            <rect width={boxW} height={boxH} rx="9" fill="rgba(36,36,38,0.96)" stroke="rgba(0,83,140,0.5)"/>

  /* ------------ APP ------------ */
  function App() {
    const [state, setStateRaw] = useState(TWEAK_DEFAULTS);
    const [tweaksOn, setTweaksOn] = useState(false);

    const setState = (patch) => setStateRaw(prev => ({ ...prev, ...patch }));

    useEffect(() => {
      document.body.dataset.accent = state.accent;
      document.body.dataset.density = state.density;
    }, [state]);

    useEffect(() => {
      const handler = (e) => {
        const d = e.data || {};
        if (d.type === '__activate_edit_mode') setTweaksOn(true);
        else if (d.type === '__deactivate_edit_mode') setTweaksOn(false);
      };
      window.addEventListener('message', handler);
      window.parent.postMessage({type:'__edit_mode_available'}, '*');
      return () => window.removeEventListener('message', handler);
    }, []);

    return (
      <>
        <Nav/>
        <Hero/>
        <PrimaryClaim/>
        <Topology topoVariant={state.topoVariant}/>
        <Moats/>
        <Packs/>
        <Benchmark/>
        <Compare/>
        <How/>
        <CTA/>
        <Footer/>
        <TweaksPanel state={state} setState={setState} visible={tweaksOn} />
      </>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
