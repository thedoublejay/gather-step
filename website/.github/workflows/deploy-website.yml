# Deploy the Starlight site to Cloudflare Pages.
#
# This workflow is OPTIONAL — if you connect the repo via the Cloudflare Pages
# dashboard, CF will build and deploy on every push automatically and you can
# delete this file. Use this workflow if you want deploys gated by CI status
# (lint/type-check/tests) before publishing.
#
# Move this file to the repo root at `.github/workflows/deploy-website.yml`
# if the indexer repo becomes the top-level GitHub repo.
#
# Required repo secrets:
#   CLOUDFLARE_API_TOKEN   — Cloudflare API token with "Pages:Edit" permission
#   CLOUDFLARE_ACCOUNT_ID  — Cloudflare account ID
#
# Required repo variable (or hardcode below):
#   CLOUDFLARE_PAGES_PROJECT — the Pages project name (e.g. "gather-step")

name: Deploy website

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/deploy-website.yml'
  pull_request:
    paths:
      - 'website/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Compute deploy branch
        id: branch
        env:
          # Untrusted GitHub inputs are sanitised via env vars here so they
          # can't be interpolated into a shell command. We also strip anything
          # that isn't a safe branch-name character before passing it on.
          HEAD_REF: ${{ github.head_ref }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          raw="${HEAD_REF:-$REF_NAME}"
          safe="$(printf '%s' "$raw" | tr -c 'A-Za-z0-9._/-' '-' | cut -c1-255)"
          echo "name=${safe}" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy website/dist
            --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT || 'gather-step' }}
            --branch=${{ steps.branch.outputs.name }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
