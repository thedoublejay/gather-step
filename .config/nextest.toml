[store]
dir = "target/nextest"

[profile.default]
fail-fast = false
retries = 1
slow-timeout = { period = "30s", terminate-after = 2 }
status-level = "all"
final-status-level = "slow"

[[profile.default.overrides]]
filter = 'test(incremental_reindex_updates_contract_drift)'
threads-required = "num-test-threads"

# Heavy end-to-end tests that index the fixture workspace and run multi-
# scenario suites. Default 30s × 2 = 60s slow-timeout is insufficient on
# slower macOS CI runners — both pack_oracle suites have a 120s internal
# budget and the CLI/integration/oracle tests routinely hit 50-60s under
# load. 60s × 4 = 240s gives enough headroom without hiding
# real perf regressions (the tests still fail on real slowdowns; the
# `runs_under_two_minutes` test still asserts < 120s internally).
[[profile.default.overrides]]
filter = '''
    test(=pack_oracle_suite_runs_under_two_minutes)
  | test(=pack_oracle_suite_proves_pack_quality_on_fixture_workspace)
  | test(=cli_commands_work_on_indexed_fixture_workspace)
  | test(=oracle_high_bar_scenarios_are_stable_across_fresh_index_runs)
  | test(=integration_pipeline_runs_on_committed_fixture_workspace)
  | test(=partial_cli_reindex_refreshes_registry_counts_from_final_graph)
'''
slow-timeout = { period = "60s", terminate-after = 4 }

# Heavy end-to-end daemon/watch tests: each indexes the fixture workspace AND
# spawns a `serve`/`watch` daemon, then proxies multiple commands. They run in
# ~4s locally but routinely hit 45-60s on loaded macOS CI runners (the green
# baseline measured 48s), tipping over the default 30s x 2 = 60s terminate.
# 60s x 4 = 240s matches the sibling heavy-test override and absorbs runner
# variance without hiding real regressions: a genuine hang still trips the
# tests' own 30s daemon-wait / child-exit deadlines well before 240s.
[[profile.default.overrides]]
filter = '''
    test(=watch_json_ready_event_allows_scripts_to_avoid_startup_race)
  | test(=serve_watch_proxies_read_only_commands_and_cleans_up_daemon_files)
  | test(=serve_without_watch_proxies_read_only_commands_and_cleans_up_daemon_files)
  | test(=watch_proxies_read_only_commands_and_cleans_up_daemon_files)
  | test(=watch_rejects_concurrent_index_with_storage_held_error_and_cleans_up_daemon_files)
'''
slow-timeout = { period = "60s", terminate-after = 4 }

[profile.stress]
fail-fast = true
retries = 0
test-threads = 4
slow-timeout = { period = "30s", terminate-after = 2 }
status-level = "fail"
final-status-level = "slow"
