name: CI

permissions:
  contents: read

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  RUST_BACKTRACE: 1

jobs:
  changes:
    name: Classify Changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.classify.outputs.rust }}
      website: ${{ steps.classify.outputs.website }}
      docs_only: ${{ steps.classify.outputs.docs_only }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - id: classify
        name: Classify changed files
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "pull_request" ]; then
            base="$PR_BASE_SHA"
          else
            base="$PUSH_BEFORE_SHA"
          fi
          head="$HEAD_SHA"
          if [ -z "$base" ] || ! git cat-file -e "$base^{commit}" 2>/dev/null; then
            base="$(git rev-parse "$head^" 2>/dev/null || true)"
          fi
          if [ -n "$base" ]; then
            git diff --name-only "$base" "$head" > changed-files.txt
          else
            git ls-files > changed-files.txt
          fi

          rust=false
          website=false
          docs_only=true
          any=false
          while IFS= read -r file; do
            [ -n "$file" ] || continue
            any=true
            case "$file" in
              Cargo.toml|Cargo.lock|justfile|crates/*|crates/**|tests/*|tests/**|benchmark/*|benchmark/**|.github/workflows/ci.yml)
                rust=true
                ;;
            esac
            case "$file" in
              website/*|website/**|.github/workflows/website.yml)
                website=true
                ;;
            esac
            case "$file" in
              *.md|docs/*|docs/**|website/src/content/docs/*|website/src/content/docs/**)
                ;;
              *)
                docs_only=false
                ;;
            esac
          done < changed-files.txt
          if [ "$any" = false ]; then
            docs_only=false
          fi
          echo "rust=$rust" >> "$GITHUB_OUTPUT"
          echo "website=$website" >> "$GITHUB_OUTPUT"
          echo "docs_only=$docs_only" >> "$GITHUB_OUTPUT"

  lint:
    name: Lint
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      # Pinned to a specific SHA (was dtolnay/rust-toolchain@master, 2026-04-15).
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: 1.94.1
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2.9.1
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Spell check
        uses: crate-ci/typos@v1.45.1

  deny:
    name: Cargo Deny
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - run: cargo deny check

  unused-deps:
    name: Unused Dependencies
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      # Pinned to a specific SHA (was dtolnay/rust-toolchain@master, 2026-04-15).
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: 1.94.1
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-shear
      - run: cargo shear

  test:
    name: Test (macOS)
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6.0.2
      # Pinned to a specific SHA (was dtolnay/rust-toolchain@master, 2026-04-15).
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: 1.94.1
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - run: cargo nextest run --all-features

  mvcc-stress:
    name: MVCC Stress
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      # Pinned to a specific SHA (was dtolnay/rust-toolchain@master, 2026-04-15).
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: 1.94.1
      - uses: Swatinem/rust-cache@v2.9.1
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: Run MVCC consistency 100x
        run: |
          for run in $(seq 1 100); do
            cargo nextest run --profile stress --test mvcc_consistency
          done

  msrv:
    name: MSRV Check
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      # Pinned to a specific SHA (was dtolnay/rust-toolchain@master, 2026-04-15).
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: 1.94.1
      - uses: Swatinem/rust-cache@v2.9.1
      - run: cargo check --all-features --locked

  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [changes, lint, deny, unused-deps, test, mvcc-stress, msrv]
    if: always()
    steps:
      - name: Report CI routing
        run: |
          echo "rust_changed=${{ needs.changes.outputs.rust }}"
          echo "website_changed=${{ needs.changes.outputs.website }}"
          echo "docs_only=${{ needs.changes.outputs.docs_only }}"
          echo "lint=${{ needs.lint.result }}"
          echo "deny=${{ needs.deny.result }}"
          echo "unused_deps=${{ needs['unused-deps'].result }}"
          echo "test=${{ needs.test.result }}"
          echo "mvcc_stress=${{ needs['mvcc-stress'].result }}"
          echo "msrv=${{ needs.msrv.result }}"
