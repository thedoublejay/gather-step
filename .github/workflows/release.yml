name: Release

on:
  push:
    # GitHub Actions tag filters are glob patterns (per the filter-pattern
    # cheat sheet), not regex. `v*.*.*` matches `v<digits>.<digits>.<digits>`
    # tags like `v1.0.0` without relying on the `+` quantifier, which is easy
    # to misread as a literal `+`.
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  verify:
    name: Verify Release Tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: 1.94.1
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2.9.1
      # Pinned to a specific SHA (was @v2). The deepsec scan flagged the
      # mutable major-version tag as a supply-chain risk on this privileged
      # release workflow because attestations:write + id-token:write make
      # the build job a high-value target for a malicious tag retag.
      - uses: taiki-e/install-action@cca35edeb1d01366c2843b68fc3ca441446d73d3
        with:
          tool: cargo-nextest
      # Pinned to a specific SHA (was @v2). The deepsec scan flagged the
      # mutable major-version tag as a supply-chain risk on this privileged
      # release workflow because attestations:write + id-token:write make
      # the build job a high-value target for a malicious tag retag.
      - uses: taiki-e/install-action@cca35edeb1d01366c2843b68fc3ca441446d73d3
        with:
          tool: cargo-deny
      # Pinned to a specific SHA (was @v2). The deepsec scan flagged the
      # mutable major-version tag as a supply-chain risk on this privileged
      # release workflow because attestations:write + id-token:write make
      # the build job a high-value target for a malicious tag retag.
      - uses: taiki-e/install-action@cca35edeb1d01366c2843b68fc3ca441446d73d3
        with:
          tool: cargo-shear
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Cargo Deny
        run: cargo deny check
      - name: Unused dependencies
        run: cargo shear
      - name: Nextest
        run: cargo nextest run --all-features

  build:
    name: Build (${{ matrix.target }})
    needs: verify
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
      attestations: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        # macOS-only by design for the initial public release scope.
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    env:
      REF_NAME: ${{ github.ref_name }}
      TARGET: ${{ matrix.target }}
    steps:
      - uses: actions/checkout@v6.0.2
      # Pinned to a specific SHA (was dtolnay/rust-toolchain@master, 2026-04-15)
      # to avoid a supply-chain vector under `attestations: write` + `id-token: write`.
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: 1.94.1
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2.9.1
      - name: Build
        shell: bash
        # `--locked` ensures the release binary is built against the exact
        # dependency graph captured in Cargo.lock; a tag build must not silently
        # resolve a different graph if a manifest changed.
        run: cargo build --release --locked --target "$TARGET" -p gather-step
      - name: Smoke test binary — version
        shell: bash
        run: "./target/${TARGET}/release/gather-step --version"
      - name: Smoke test binary — help
        shell: bash
        run: "./target/${TARGET}/release/gather-step --help"
      - name: Smoke test binary — index + status against embedded fixture
        shell: bash
        run: |
          set -euo pipefail
          fixture=$(mktemp -d)
          mkdir -p "$fixture/repos/smoke/src"
          cat > "$fixture/gather-step.config.yaml" <<'YAML'
          repos:
            - name: smoke
              path: repos/smoke
          indexing:
            workspace_concurrency: 1
          YAML
          cat > "$fixture/repos/smoke/package.json" <<'JSON'
          { "name": "smoke", "dependencies": { "@nestjs/core": "^11.0.0" } }
          JSON
          cat > "$fixture/repos/smoke/src/smoke.ts" <<'TS'
          export function smokeFn(): number { return 1; }
          TS
          "./target/${TARGET}/release/gather-step" \
            --workspace "$fixture" --json index
          "./target/${TARGET}/release/gather-step" \
            --workspace "$fixture" --json status
          rm -rf "$fixture"
      - name: Package archive
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${TARGET}/release/gather-step" "dist/gather-step-${TARGET}"
          tar -C dist -czf "dist/gather-step-${REF_NAME}-${TARGET}.tar.gz" "gather-step-${TARGET}"
      - name: Upload archive artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: gather-step-${{ matrix.target }}
          path: dist/gather-step-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
      # Attest the archive so users can verify the downloaded release bundle.
      - name: Attest archive provenance
        uses: actions/attest-build-provenance@v4.1.0
        with:
          subject-path: dist/gather-step-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
      # Attest the binary directly so `gh attestation verify` works on the
      # extracted binary too, not only on the archive bundle.
      - name: Attest binary provenance
        uses: actions/attest-build-provenance@v4.1.0
        with:
          subject-path: dist/gather-step-${{ matrix.target }}

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: dist
          merge-multiple: true
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3.0.0
        with:
          draft: true
          files: dist/*.tar.gz

  bump-homebrew:
    name: Bump Homebrew Formula
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: dist
          merge-multiple: true
      - name: Checkout Homebrew tap
        uses: actions/checkout@v6.0.2
        with:
          repository: thedoublejay/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          path: homebrew-tap
      - name: Update formula URLs and checksums
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          aarch64_archive="gather-step-${REF_NAME}-aarch64-apple-darwin.tar.gz"
          x86_archive="gather-step-${REF_NAME}-x86_64-apple-darwin.tar.gz"
          export aarch64_sha
          export x86_sha
          export aarch64_url
          export x86_url
          aarch64_sha="$(shasum -a 256 "dist/${aarch64_archive}" | awk '{print $1}')"
          x86_sha="$(shasum -a 256 "dist/${x86_archive}" | awk '{print $1}')"
          aarch64_url="https://github.com/${REPOSITORY}/releases/download/${REF_NAME}/${aarch64_archive}"
          x86_url="https://github.com/${REPOSITORY}/releases/download/${REF_NAME}/${x86_archive}"
          ruby <<'RUBY'
          path = "homebrew-tap/Formula/gather-step.rb"
          formula = File.read(path)
          replacements = {
            /url "https:\/\/github\.com\/[^"]+\/releases\/download\/v[^"]+\/gather-step-v[^"]+-aarch64-apple-darwin\.tar\.gz"\n(\s*)sha256 "[0-9a-f]+"/ =>
              "url \"#{ENV.fetch("aarch64_url")}\"\n\\1sha256 \"#{ENV.fetch("aarch64_sha")}\"",
            /url "https:\/\/github\.com\/[^"]+\/releases\/download\/v[^"]+\/gather-step-v[^"]+-x86_64-apple-darwin\.tar\.gz"\n(\s*)sha256 "[0-9a-f]+"/ =>
              "url \"#{ENV.fetch("x86_url")}\"\n\\1sha256 \"#{ENV.fetch("x86_sha")}\"",
          }
          replacements.each do |pattern, replacement|
            before = formula
            formula = formula.sub(pattern, replacement)
            abort("formula pattern not found: #{pattern.inspect}") if formula == before
          end
          File.write(path, formula)
          RUBY
      - name: Open Homebrew tap PR
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          cd homebrew-tap
          branch="bump-gather-step-${REF_NAME}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$branch"
          git add Formula/gather-step.rb
          if git diff --cached --quiet; then
            echo "Formula already up to date."
            exit 0
          fi
          git commit -m "gather-step ${REF_NAME}"
          git push --force-with-lease origin "$branch"
          if gh pr view "$branch" --repo thedoublejay/homebrew-tap >/dev/null 2>&1; then
            echo "Homebrew tap PR already exists for ${branch}."
          else
            gh pr create \
              --repo thedoublejay/homebrew-tap \
              --base main \
              --head "$branch" \
              --title "gather-step ${REF_NAME}" \
              --body "Updates gather-step macOS release URLs and SHA256 checksums for ${REF_NAME}. Do not merge until the GitHub release is no longer draft."
          fi
